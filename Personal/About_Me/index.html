    <style>
      .about-wrap {
        min-height: calc(100vh - var(--nav-h));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px 80px;
      }

      .about-content {
        text-align: center;
        max-width: 480px;
      }

      .about-content h1 {
        font-size: clamp(2rem, 5.5vw, 3.2rem);
        font-weight: 700;
        letter-spacing: -0.05em;
        line-height: 1.1;
        background: linear-gradient(135deg, #ffffff 0%, #c7d2fe 40%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
        animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
      }

      .about-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-glow);
        border: 1px solid rgba(165,180,252,0.2);
        border-radius: 100px;
        padding: 5px 14px;
        margin-bottom: 28px;
        animation: fadeUp 0.7s 0.05s cubic-bezier(0.22,1,0.36,1) both;
      }

      .about-sub {
        font-size: 1rem;
        color: rgba(241,245,249,0.48);
        line-height: 1.7;
        animation: fadeUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
